<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 3</title>
</head>
<body>
   <h2>Questão 3</h2>
   
   <span>Quantidade de MB de internet consumida no plano</span>
   <input type="text" id="input_mb"> <br>

   <span>Indicação se há telefone vinculado ao plano</span>
   <input type="text" id="input_indicacao"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>
/* Faça sua lógica aqui! Não altere o HTML. */
function calcular() {
   let mb = Number(input_mb.value);
   let telefone = input_indicacao.value
   let  acORdc = 40; //acrescimo ou desconto

   if (mb < 200) {
      let valorBase = mb + acORdc;
      if ( telefone == "sim") {
         let valorFinal = valorBase * 1.20;

         div_mensagem.innerHTML = `Com o consumo de ${mb} MB de internet, o valor base do plano de internet é R$ ${valorBase} totalizando R$ ${valorFinal} com telefone.`
      } 
      if (telefone == "não") {
         div_mensagem.innerHTML = `Com o consumo de ${mb} MB de internet, o valor do plano de internet totaliza R$${valorBase}.`
      }
   } else {
      let valorBase = mb - acORdc;
      if ( telefone == "sim") {
         let valorFinal = valorBase * 1.20;

         div_mensagem.innerHTML = `Com o consumo de ${mb} MB de internet, o valor base do plano de internet é R$ ${valorBase} totalizando R$ ${valorFinal} com telefone.`         
      } 
      if (telefone == "não") {
         div_mensagem.innerHTML = `Com o consumo de ${mb} MB de internet, o valor do plano de internet totaliza R$${valorBase}.`
      }
   }
}
</script>
