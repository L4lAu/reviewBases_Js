<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>temperatura</p>
    <input type="number" id="ipt_temperatura">
    <p>umidade do ar</p>
    <input type="number" id="ipt_umidade"> <br>
    <button onclick="avaliarClima()">avaliar clima</button><br>
    <div id="mensagem"></div>
</body>
</html>

<script>
    function avaliarClima(){
        let temperatura = Number(ipt_temperatura.value);
        let umidade = Number(ipt_umidade.value);

        if(umidade < 0 || umidade > 100) {
            alert("valor de umidade invalido")
            mensagem.innerHTML = ""
        } else if ( temperatura >= 22 && temperatura <= 23 && umidade < 60) {
            mensagem.innerHTML = "clima agradavel"
        } else {
            mensagem.innerHTML = "clima desconfortavel"
        }
    }
</script>
