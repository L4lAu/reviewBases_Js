<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>qual a meta de economia?</p>
    <input type="number" id="ipt_meta">
    <p>quanto voce guardou?</p>
    <input type="number" id="ipt_guardado">
    <button onclick="analisarEconomia()">Analisar economia</button> <br>
    <div id="mensagem"></div>
</body>
</html>

<script>
    function analisarEconomia(){
        let meta = Number(ipt_meta.value);
        let guardado = Number(ipt_guardado.value);
        
        console.log (meta, ',' ,guardado)
        if ( meta < guardado) {
            let diferenca = (guardado - meta);

            mensagem.innerHTML = `Meta ultrapassada em ${diferenca}`;
        } 
        if ( meta == guardado) {
            mensagem.innerHTML = `Parabens, meta alcançada!`;
        } else if ( meta > guardado ){
            let diferenca = (meta - guardado);

            mensagem.innerHTML = `Força! Ainda em busca da meta! Falta ${diferenca}`;
        }
    }
</script>
