<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>renda familiar mensal</h1>
    <input type="number" id="rendaMensal">
    <button onclick="analisar()">Analisar Renda</button>
    <span id="mensagem"></span>
</body>
</html>

<script>
    function analisar(){
        let renda = rendaMensal.value;

        if (renda <= 250) {
            mensagem.innerHTML = "Classe E"
        } else if (renda <= 900) {
            mensagem.innerHTML = "Classe D"
        } else if (renda <= 2500) {
            mensagem.innerHTML = "Classe C"
        } else if (renda <= 9500) {
            mensagem.innerHTML = "Classe B"
        } else {
            mensagem.innerHTML = "Classe A"
        }
    }
</script>
