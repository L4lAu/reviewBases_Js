<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> qual desses time de SP voce torce (São Paulo, Palmeiras, Corinthians, Santos)?</h1>
    <input type="text" id="ipt_time">
    <button onclick="faleSobre()">fale sobre esse time</button>
    <div id="mensagem"></div>
</body>
</html>

<script>
    function faleSobre(){
        let time = String(ipt_time.value).toLowerCase();

        mensagem.innerHTML = `${time}`
        if(time == 'corinthians') {
            mensagem.innerHTML = "<span style='background-color: black; color: white;'>Salve o Corinthians</span>"
        }
        if(time == 'são paulo') {
            mensagem.innerHTML = "<span style='background-color:black; color: red'> Salve o Tricolor paulista</span>"
        }
        if(time == 'palmeiras'){
            mensagem.innerHTML = "<span style='background-color:green; color: white;'> Salve o alviverde imponente</span>"
        }
        if(time == 'santos'){
            mensagem.innerHTML = "<span style=''>Agora quem dá a bola é o Santos </span>"
        }
    }
</script>
